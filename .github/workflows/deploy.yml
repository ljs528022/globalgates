name: Deploy to EC2

on:
  push:
    branches:
      - main

jobs:
  deploy:
    if: github.repository == 'aws-globalgates/globalgates-aws'
    runs-on: ubuntu-24.04

    strategy:
      matrix:
        include:
          - name: EC2_HOST1
          - name: EC2_HOST2

    steps:
    - name: Checkout code
      uses: actions/checkout@v3

    - name: Set HOST env var from secrets
      run: echo "HOST=${{ secrets[matrix.name] }}" >> $GITHUB_ENV

    - name: Validate required secrets
      env:
        TARGET_HOST: ${{ secrets[matrix.name] }}
        EC2_USER: ${{ secrets.EC2_USER }}
        EC2_KEY: ${{ secrets.EC2_KEY }}
        EC2_HOST: ${{ secrets.EC2_HOST }}
        SERVER_PORT: ${{ secrets.SERVER_PORT }}
        PSQL_PORT: ${{ secrets.PSQL_PORT }}
        PSQL_DATABASE: ${{ secrets.PSQL_DATABASE }}
        PSQL_USERNAME: ${{ secrets.PSQL_USERNAME }}
        PSQL_PASSWORD: ${{ secrets.PSQL_PASSWORD }}
        REDIS_PORT: ${{ secrets.REDIS_PORT }}
        RABBITMQ_PORT: ${{ secrets.RABBITMQ_PORT }}
        RABBITMQ_USERNAME: ${{ secrets.RABBITMQ_USERNAME }}
        RABBITMQ_PASSWORD: ${{ secrets.RABBITMQ_PASSWORD }}
        MAIL_USERNAME: ${{ secrets.MAIL_USERNAME }}
        MAIL_PASSWORD: ${{ secrets.MAIL_PASSWORD }}
        JWT_SECRET: ${{ secrets.JWT_SECRET }}
        AWS_ACCESS_KEY: ${{ secrets.AWS_ACCESS_KEY }}
        AWS_SECRET_KEY: ${{ secrets.AWS_SECRET_KEY }}
        AWS_BUCKET_NAME: ${{ secrets.AWS_BUCKET_NAME }}
        AWS_REGION: ${{ secrets.AWS_REGION }}
        SOLAPI_KEY: ${{ secrets.SOLAPI_KEY }}
        SOLAPI_SECRET: ${{ secrets.SOLAPI_SECRET }}
        BOOTPAY_ID: ${{ secrets.BOOTPAY_ID }}
        BOOTPAY_PRIVATEKEY: ${{ secrets.BOOTPAY_PRIVATEKEY }}
        BOOTPAY_APIURL: ${{ secrets.BOOTPAY_APIURL }}
        AI_CONTENTS_BASE_URL: ${{ secrets.AI_CONTENTS_BASE_URL }}
        INTERNAL_AI_TOKEN: ${{ secrets.INTERNAL_AI_TOKEN }}
        FASTAPI_PORT: ${{ secrets.FASTAPI_PORT }}
        LIVEKIT_PORT: ${{ secrets.LIVEKIT_PORT }}
        KAKAO_CLIENT_ID: ${{ secrets.KAKAO_CLIENT_ID }}
        KAKAO_CLIENT_SECRET: ${{ secrets.KAKAO_CLIENT_SECRET }}
        NAVER_CLIENT_ID: ${{ secrets.NAVER_CLIENT_ID }}
        NAVER_CLIENT_SECRET: ${{ secrets.NAVER_CLIENT_SECRET }}
        GOOGLE_CLIENT_ID: ${{ secrets.GOOGLE_CLIENT_ID }}
        GOOGLE_CLIENT_SECRET: ${{ secrets.GOOGLE_CLIENT_SECRET }}
        FACEBOOK_CLIENT_ID: ${{ secrets.FACEBOOK_CLIENT_ID }}
        FACEBOOK_CLIENT_SECRET: ${{ secrets.FACEBOOK_CLIENT_SECRET }}
        GOOGLE_MAPS_API_KEY: ${{ secrets.GOOGLE_MAPS_API_KEY }}
        KAKAO_MAPS_JS_KEY: ${{ secrets.KAKAO_MAPS_JS_KEY }}
      run: |
        missing=0
        for name in TARGET_HOST EC2_USER EC2_KEY EC2_HOST SERVER_PORT PSQL_PORT PSQL_DATABASE PSQL_USERNAME PSQL_PASSWORD REDIS_PORT RABBITMQ_PORT RABBITMQ_USERNAME RABBITMQ_PASSWORD MAIL_USERNAME MAIL_PASSWORD JWT_SECRET AWS_ACCESS_KEY AWS_SECRET_KEY AWS_BUCKET_NAME AWS_REGION SOLAPI_KEY SOLAPI_SECRET BOOTPAY_ID BOOTPAY_PRIVATEKEY BOOTPAY_APIURL AI_CONTENTS_BASE_URL INTERNAL_AI_TOKEN FASTAPI_PORT LIVEKIT_PORT KAKAO_CLIENT_ID KAKAO_CLIENT_SECRET NAVER_CLIENT_ID NAVER_CLIENT_SECRET GOOGLE_CLIENT_ID GOOGLE_CLIENT_SECRET FACEBOOK_CLIENT_ID FACEBOOK_CLIENT_SECRET GOOGLE_MAPS_API_KEY KAKAO_MAPS_JS_KEY; do
          if [ -z "${!name}" ]; then
            echo "::error title=Missing required secret::${name} is empty or not configured"
            missing=1
          fi
        done
        exit "$missing"

    - name: Debug EC2_HOST
      run: echo "EC2_HOST is ${{ secrets.EC2_HOST }}"

    - name: Set up SSH
      run: |
        mkdir -p ~/.ssh
        echo "${{ secrets.EC2_KEY }}" > ~/.ssh/id_rsa
        chmod 600 ~/.ssh/id_rsa
        ssh-keyscan -H $HOST >> ~/.ssh/known_hosts

    - name: Copy project to EC2
      run: |
        rsync -az --delete --delete-excluded \
          --exclude='.git/' \
          --exclude='.gradle/' \
          --exclude='build/' \
          --exclude='out/' \
          --exclude='.idea/' \
          --exclude='.vscode/' \
          --exclude='.claude/' \
          --exclude='.gstack/' \
          --exclude='.playwright-mcp/' \
          --exclude='docs/' \
          --exclude='mockups/' \
          --exclude='mockup_ai_chat.html' \
          --exclude='*.md' \
          --exclude='*.log' \
          --exclude='.DS_Store' \
          --exclude='src/main/resources/key/' \
          -e "ssh -i ~/.ssh/id_rsa" \
          ./ ${{ secrets.EC2_USER }}@$HOST:/home/ubuntu/app/

    - name: Build & Run Docker on EC2
      run: |
        ssh -i ~/.ssh/id_rsa ${{ secrets.EC2_USER }}@$HOST << EOF
          set -e
          cd /home/ubuntu/app
          echo "Docker disk usage before cleanup"
          df -h / /var/lib/docker || true
          docker system df || true
          docker stop app || true
          docker rm app || true
          docker rmi app || true
          docker container prune -f || true
          docker image prune -af || true
          docker builder prune -af || true
          echo "Docker disk usage after cleanup"
          df -h / /var/lib/docker || true
          docker system df || true
          DOCKER_BUILDKIT=1 docker build --progress=plain --build-arg JWT_SECRET="${{ secrets.JWT_SECRET }}" \
            --build-arg PSQL_PORT="${{ secrets.PSQL_PORT }}" \
            --build-arg PSQL_DATABASE="${{ secrets.PSQL_DATABASE }}" \
            --build-arg PSQL_USERNAME="${{ secrets.PSQL_USERNAME }}" \
            --build-arg PSQL_PASSWORD="${{ secrets.PSQL_PASSWORD }}" \
            --build-arg REDIS_PORT="${{ secrets.REDIS_PORT }}" \
            --build-arg RABBITMQ_PORT="${{ secrets.RABBITMQ_PORT }}" \
            --build-arg RABBITMQ_USERNAME="${{ secrets.RABBITMQ_USERNAME }}" \
            --build-arg RABBITMQ_PASSWORD="${{ secrets.RABBITMQ_PASSWORD }}" \
            --build-arg MAIL_USERNAME="${{ secrets.MAIL_USERNAME }}" \
            --build-arg MAIL_PASSWORD="${{ secrets.MAIL_PASSWORD }}" \
            --build-arg EC2_HOST="${{ secrets.EC2_HOST }}" \
            --build-arg SERVER_PORT="${{ secrets.SERVER_PORT }}" \
            --build-arg AWS_ACCESS_KEY="${{ secrets.AWS_ACCESS_KEY }}" \
            --build-arg AWS_SECRET_KEY="${{ secrets.AWS_SECRET_KEY }}" \
            --build-arg AWS_BUCKET_NAME="${{ secrets.AWS_BUCKET_NAME }}" \
            --build-arg AWS_REGION="${{ secrets.AWS_REGION }}" \
            --build-arg SOLAPI_KEY="${{ secrets.SOLAPI_KEY }}" \
            --build-arg SOLAPI_SECRET="${{ secrets.SOLAPI_SECRET }}" \
            --build-arg BOOTPAY_ID="${{ secrets.BOOTPAY_ID }}" \
            --build-arg BOOTPAY_PRIVATEKEY="${{ secrets.BOOTPAY_PRIVATEKEY }}" \
            --build-arg BOOTPAY_APIURL="${{ secrets.BOOTPAY_APIURL }}" \
            --build-arg AI_CONTENTS_BASE_URL="${{ secrets.AI_CONTENTS_BASE_URL }}" \
            --build-arg INTERNAL_AI_TOKEN="${{ secrets.INTERNAL_AI_TOKEN }}" \
            --build-arg FASTAPI_PORT="${{ secrets.FASTAPI_PORT }}" \
            --build-arg LIVEKIT_PORT="${{ secrets.LIVEKIT_PORT }}" \
            --build-arg KAKAO_CLIENT_ID="${{ secrets.KAKAO_CLIENT_ID }}" \
            --build-arg KAKAO_CLIENT_SECRET="${{ secrets.KAKAO_CLIENT_SECRET }}" \
            --build-arg NAVER_CLIENT_ID="${{ secrets.NAVER_CLIENT_ID }}" \
            --build-arg NAVER_CLIENT_SECRET="${{ secrets.NAVER_CLIENT_SECRET }}" \
            --build-arg GOOGLE_CLIENT_ID="${{ secrets.GOOGLE_CLIENT_ID }}" \
            --build-arg GOOGLE_CLIENT_SECRET="${{ secrets.GOOGLE_CLIENT_SECRET }}" \
            --build-arg FACEBOOK_CLIENT_ID="${{ secrets.FACEBOOK_CLIENT_ID }}" \
            --build-arg FACEBOOK_CLIENT_SECRET="${{ secrets.FACEBOOK_CLIENT_SECRET }}" \
            --build-arg GOOGLE_MAPS_API_KEY="${{ secrets.GOOGLE_MAPS_API_KEY }}" \
            --build-arg KAKAO_MAPS_JS_KEY="${{ secrets.KAKAO_MAPS_JS_KEY }}" \
          -t app .
          docker run -d -p 80:10000 --name app \
            -e JWT_SECRET="${{ secrets.JWT_SECRET }}" \
            -e PSQL_PORT="${{ secrets.PSQL_PORT }}" \
            -e PSQL_DATABASE="${{ secrets.PSQL_DATABASE }}" \
            -e PSQL_USERNAME="${{ secrets.PSQL_USERNAME }}" \
            -e PSQL_PASSWORD="${{ secrets.PSQL_PASSWORD }}" \
            -e REDIS_PORT="${{ secrets.REDIS_PORT }}" \
            -e RABBITMQ_PORT="${{ secrets.RABBITMQ_PORT }}" \
            -e RABBITMQ_USERNAME="${{ secrets.RABBITMQ_USERNAME }}" \
            -e RABBITMQ_PASSWORD="${{ secrets.RABBITMQ_PASSWORD }}" \
            -e MAIL_USERNAME="${{ secrets.MAIL_USERNAME }}" \
            -e MAIL_PASSWORD="${{ secrets.MAIL_PASSWORD }}" \
            -e EC2_HOST="${{ secrets.EC2_HOST }}" \
            -e SERVER_PORT="${{ secrets.SERVER_PORT }}" \
            -e AWS_ACCESS_KEY="${{ secrets.AWS_ACCESS_KEY }}" \
            -e AWS_SECRET_KEY="${{ secrets.AWS_SECRET_KEY }}" \
            -e AWS_BUCKET_NAME="${{ secrets.AWS_BUCKET_NAME }}" \
            -e AWS_REGION="${{ secrets.AWS_REGION }}" \
            -e SOLAPI_KEY="${{ secrets.SOLAPI_KEY }}" \
            -e SOLAPI_SECRET="${{ secrets.SOLAPI_SECRET }}" \
            -e BOOTPAY_ID="${{ secrets.BOOTPAY_ID }}" \
            -e BOOTPAY_PRIVATEKEY="${{ secrets.BOOTPAY_PRIVATEKEY }}" \
            -e BOOTPAY_APIURL="${{ secrets.BOOTPAY_APIURL }}" \
            -e AI_CONTENTS_BASE_URL="${{ secrets.AI_CONTENTS_BASE_URL }}" \
            -e INTERNAL_AI_TOKEN="${{ secrets.INTERNAL_AI_TOKEN }}" \
            -e FASTAPI_PORT="${{ secrets.FASTAPI_PORT }}" \
            -e LIVEKIT_PORT="${{ secrets.LIVEKIT_PORT }}" \
            -e KAKAO_CLIENT_ID="${{ secrets.KAKAO_CLIENT_ID }}" \
            -e KAKAO_CLIENT_SECRET="${{ secrets.KAKAO_CLIENT_SECRET }}" \
            -e NAVER_CLIENT_ID="${{ secrets.NAVER_CLIENT_ID }}" \
            -e NAVER_CLIENT_SECRET="${{ secrets.NAVER_CLIENT_SECRET }}" \
            -e GOOGLE_CLIENT_ID="${{ secrets.GOOGLE_CLIENT_ID }}" \
            -e GOOGLE_CLIENT_SECRET="${{ secrets.GOOGLE_CLIENT_SECRET }}" \
            -e FACEBOOK_CLIENT_ID="${{ secrets.FACEBOOK_CLIENT_ID }}" \
            -e FACEBOOK_CLIENT_SECRET="${{ secrets.FACEBOOK_CLIENT_SECRET }}" \
            -e GOOGLE_MAPS_API_KEY="${{ secrets.GOOGLE_MAPS_API_KEY }}" \
            -e KAKAO_MAPS_JS_KEY="${{ secrets.KAKAO_MAPS_JS_KEY }}" \
            app
        EOF

    - name: Clean up Docker disk on EC2
      if: always()
      run: |
        if [ -n "${HOST:-}" ] && [ -f ~/.ssh/id_rsa ]; then
          ssh -i ~/.ssh/id_rsa ${{ secrets.EC2_USER }}@$HOST << 'EOF' || true
            docker container prune -f || true
            docker image prune -f || true
            docker builder prune -af || true
            docker system df || true
        EOF
        fi
