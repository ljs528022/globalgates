server:
  port: ${SERVER_PORT:10000}
  servlet:
    session:
      tracking-modes: cookie
  # Nginx가 SSL 종료 후 HTTP로 프록시하므로,
  # Spring이 X-Forwarded-* 헤더를 신뢰하게 만들어야
  # OAuth redirect URL이나 Location 헤더가 https://globalgates.ai.kr 로 올바르게 만들어진다.
  forward-headers-strategy: framework

spring:
  datasource:
    driver-class-name: org.postgresql.Driver
    url: jdbc:postgresql://${EC2_HOST}:${PSQL_PORT}/${PSQL_DATABASE}?serverTimezone=Asia/Seoul
    username: ${PSQL_USERNAME}
    password: ${PSQL_PASSWORD}
  sql:
    init:
      # 회원가입은 tbl_category 시드 데이터에 의존하므로 앱 기동 시 항상 카테고리를 채워둔다.
      # category_data.sql 은 ON CONFLICT DO NOTHING 으로 작성돼 있어 재실행해도 중복 에러가 나지 않는다.
      mode: always
      data-locations: classpath:sql/category_data.sql
      continue-on-error: true
  session:
    redis:
      repository-type: indexed
      flush-mode: immediate
  data:
    redis:
      host: ${EC2_HOST}
      port: ${REDIS_PORT}
  rabbitmq:
    host: ${EC2_HOST}
    port: ${RABBITMQ_PORT}
    username: ${RABBITMQ_USERNAME}
    password: ${RABBITMQ_PASSWORD}
  mail:
    host: smtp.gmail.com
    port: 587
    username: ${MAIL_USERNAME}
    password: "${MAIL_PASSWORD}"
    properties:
      mail:
        smtp:
          auth: true
          starttls:
            enable: true

  cache:
    type: redis

  profiles:
    active: local
    include: oauth

  servlet:
    multipart:
      enabled: true
      file-size-threshold: 10MB
      max-file-size: 10MB
      max-request-size: 20MB

mybatis:
  mapper-locations: classpath*:mapper/**/*.xml
  type-aliases-package: com.app.globalgates.domain; com.app.globalgates.dto;
  type-handlers-package: com.app.globalgates.mybatis.handler
  configuration:
    map-underscore-to-camel-case: true

# openssl rand -base64 32
jwt:
  secret: ${JWT_SECRET}

aws:
  access-key: ${AWS_ACCESS_KEY}
  secret-key: ${AWS_SECRET_KEY}
  s3:
    bucket-name: ${AWS_BUCKET_NAME}
  region: ${AWS_REGION}

message:
  api-key: ${SOLAPI_KEY}
  api-secret-key: ${SOLAPI_SECRET}

bootpay:
  application-id: ${BOOTPAY_ID}
  private-key: ${BOOTPAY_KEY}
  api-base-url: ${BOOTPAY_URL}

# Frontend에서 사용하는 지도 SDK 키 (GH Actions Secret 주입)
google:
  maps:
    api-key: ${GOOGLE_MAPS_API_KEY}

kakao:
  maps:
    js-key: ${KAKAO_MAPS_JS_KEY}

# LiveKit 영상통화 서버
livekit:
  server:
    url: https://${LIVEKIT_HOST}:${LIVEKIT_PORT}/token

# WebSocket(STOMP) 허용 origin (콤마 구분, 포트는 와일드카드).
websocket:
  allowed-origins: https://${EC2_HOST}:*,http://${EC2_HOST}:*
